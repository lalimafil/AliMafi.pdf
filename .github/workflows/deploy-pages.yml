name: 📄✨ Build & Deploy CV to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🚀 Setup Tectonic
        uses: wtfjoke/setup-tectonic@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          tectonic-version: "0.15.0"

      - name: 🏗️ Build PDF
        run: |
          tectonic -X build

      - name: 📦 Prepare Pages Artifact
        run: |
          mkdir -p public
          cp build/AliMafi/AliMafi.pdf public/AliMafi.pdf
          cat > public/index.html << 'EOF'
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=AliMafi.pdf">
              <title>Ali Mafi – CV</title>
            </head>
            <body>
              <p>Redirecting to CV... <a href="AliMafi.pdf">Click here if not redirected.</a></p>
            </body>
            </html>
           EOF 

      - name: 📄 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
