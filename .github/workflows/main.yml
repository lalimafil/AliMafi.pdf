name: 📄 Build & Deploy CV (XeLaTeX)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install minimal TeX deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          texlive-xetex \
          texlive-latex-extra \
          texlive-fonts-recommended \
          latexmk \
          texlive-fonts-fontawesome

      - name: Build PDF with XeLaTeX
        run: |
          latexmk -xelatex -interaction=nonstopmode -halt-on-error ./src/main.tex

      - name: Prepare Pages folder
        run: |
          mkdir public
          cp main.pdf public/

          echo "cv.alimafi.ir" > public/CNAME

          cat > public/index.html << 'EOF'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=main.pdf">
            <title>CV</title>
          </head>
          <body>
            <a href="main.pdf">Download CV</a>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
